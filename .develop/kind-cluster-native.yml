# Kind cluster configuration for native architecture development
# Includes Cilium CNI and KubeVirt support
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: clabernetes-native
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
        ---
        kind: ClusterConfiguration
        networking:
          disableDefaultCNI: true  # Disable default CNI for Cilium
          podSubnet: "10.244.0.0/16"
        ---
        kind: KubeletConfiguration
        serverTLSBootstrap: true
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP
  - role: worker
    labels:
      topology.node.k8s.io/zone: zone-a
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "topology.node.k8s.io/zone=zone-a"
  - role: worker  
    labels:
      topology.node.k8s.io/zone: zone-b
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "topology.node.k8s.io/zone=zone-b"
# Enable nested virtualization for KubeVirt
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
      runtime_type = "io.containerd.runc.v2"
      [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
        SystemdCgroup = true
featureGates:
  # Enable feature gates needed for advanced networking
  NetworkPolicy: true
  ServiceLoadBalancerClass: true